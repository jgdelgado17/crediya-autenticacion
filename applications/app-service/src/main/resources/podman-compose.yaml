version: "3.9"

services:
  autentication-db:
    image: postgres:15
    container_name: crediya-autentication-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crediya_autentication
    ports:
      - "5432:5432"
    volumes:
      - pg_autentication_data:/var/lib/postgresql/data

volumes:
  pg_autentication_data: